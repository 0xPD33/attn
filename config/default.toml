# Non-watch-list defaults. See config/apps/<category>.txt and
# config/domains/<category>.txt for the per-category watch lists. The
# combined config/default.toml is generated by tools/sync-default-config.sh
# from this file plus those per-category files; do not hand-edit
# config/default.toml.

poll_interval_secs = 60
idle_after_secs = 300
socket_path = "$XDG_RUNTIME_DIR/attn.sock"
state_path = "~/.local/state/attn/attn.sqlite"

[display]
domains_show_top = 12
domains_min_seconds = 30

[browsers.helium]
app_ids = ["helium", "net.imput.helium"]
history_paths = [
  "~/.config/net.imput.helium/*/History",
  "~/.var/app/net.imput.helium/config/net.imput.helium/*/History",
]
kind = "chromium"

[browsers.brave]
app_ids = ["brave-browser", "brave", "com.brave.Browser"]
history_paths = [
  "~/.config/BraveSoftware/Brave-Browser/*/History",
  "~/.var/app/com.brave.Browser/config/BraveSoftware/Brave-Browser/*/History",
  "~/snap/brave/current/.config/BraveSoftware/Brave-Browser/*/History",
]
kind = "chromium"

[browsers.chrome]
app_ids = ["google-chrome", "chrome", "com.google.Chrome"]
history_paths = [
  "~/.config/google-chrome/*/History",
  "~/.var/app/com.google.Chrome/config/google-chrome/*/History",
]
kind = "chromium"

[browsers.chromium]
app_ids = ["chromium", "chromium-browser", "org.chromium.Chromium", "Chromium-browser"]
history_paths = [
  "~/.config/chromium/*/History",
  "~/.var/app/org.chromium.Chromium/config/chromium/*/History",
  "~/snap/chromium/common/chromium/*/History",
]
kind = "chromium"

[browsers.firefox]
app_ids = ["firefox", "Firefox", "org.mozilla.firefox"]
history_paths = ["~/.mozilla/firefox/*/places.sqlite"]
kind = "firefox"

[browsers.zen]
app_ids = ["zen", "zen-alpha", "app.zen_browser.zen", "io.github.zen_browser.zen"]
history_paths = ["~/.zen/*/places.sqlite"]
kind = "firefox"

[browsers.librewolf]
app_ids = ["librewolf", "io.gitlab.librewolf-community"]
history_paths = ["~/.librewolf/*/places.sqlite"]
kind = "firefox"

[browsers.floorp]
app_ids = ["floorp", "one.ablaze.floorp"]
history_paths = ["~/.floorp/*/places.sqlite"]
kind = "firefox"

[terminals]
poll_secs = 10
[terminals.apps]
ai = ["claude", "codex", "aichat"]
editor = ["nvim", "vim", "hx", "helix", "emacs"]

[breaks]
enabled = true
interval_secs = 3600
min_break_secs = 300

[focus_source]
kind = "auto"   # auto | niri | hyprland | river | sway

[notifications]
enabled = true
break_overdue = true
budget_exceeded = true

