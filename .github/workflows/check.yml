name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  config-sync:
    name: config in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify config/default.toml matches per-category sources
        run: tools/sync-default-config.sh --check

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --release --locked
